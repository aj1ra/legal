<!DOCTYPE html>
<html lang="{{ site.lang | default: 'ja' }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title | default: site.title }}</title>
  <style>
    body {
      max-width: 760px;
      margin: 2em auto;
      padding: 0 1em 4em;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "Hiragino Sans", "Hiragino Kaku Gothic ProN", Meiryo, sans-serif;
      line-height: 1.7;
      color: #24292f;
      background: #ffffff;
    }
    h1, h2, h3, h4 { line-height: 1.3; margin-top: 1.6em; }
    h1 { border-bottom: 1px solid #d0d7de; padding-bottom: 0.3em; }
    h2 { border-bottom: 1px solid #eaecef; padding-bottom: 0.2em; }
    a { color: #0969da; text-decoration: none; }
    a:hover { text-decoration: underline; }
    table { border-collapse: collapse; margin: 1em 0; }
    th, td { border: 1px solid #d0d7de; padding: 0.5em 0.9em; }
    th { background: #f6f8fa; }
    blockquote { border-left: 4px solid #d0d7de; margin: 1em 0; padding: 0.2em 1em; color: #57606a; }
    code { background: #f6f8fa; padding: 0.15em 0.4em; border-radius: 3px; font-family: ui-monospace, SFMono-Regular, "SF Mono", Consolas, monospace; font-size: 0.9em; }
    pre { background: #f6f8fa; padding: 1em; border-radius: 4px; overflow-x: auto; }
    pre code { background: transparent; padding: 0; }
    hr { border: none; border-top: 1px solid #d0d7de; margin: 2em 0; }
    ul, ol { padding-left: 1.5em; }
  </style>
</head>
<body>
  {{ content }}
</body>
</html>
